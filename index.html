<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📦 出貨小助手 - 完整版</title>
    <style>
        :root { --blue: #1a73e8; --green: #34a853; --orange: #fbbc04; --red: #ea4335; --purple: #a142f4; --dark: #202124; --bg: #f0f4f8; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 10px; margin: 0; color: #3c4043; min-height: 100vh; display: flex; flex-direction: column; }
        .container { max-width: 600px; margin: auto; flex: 1; width: 100%; }
        
        .header { text-align: center; padding: 20px 0 10px 0; }
        .header h1 { font-size: 24px; color: var(--blue); margin: 0; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .header p { font-size: 14px; color: #666; margin: 5px 0 15px 0; }

        .search-card { position: sticky; top: 10px; background: white; padding: 18px; border-radius: 25px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); z-index: 100; border: 2px solid #e0e6ed; }
        input { width: 100%; padding: 14px 20px; border: none; background: #f8f9fa; border-radius: 15px; font-size: 17px; box-sizing: border-box; outline: none; }

        .empty-state { text-align: center; padding: 50px 20px; color: #99aab5; }
        .empty-state .emoji { font-size: 60px; display: block; margin-bottom: 10px; }

        .group-card { background: white; margin-top: 20px; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.06); border-left: 12px solid; animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .c-0 { border-color: var(--blue); }
        .c-1 { border-color: var(--green); }
        .c-2 { border-color: var(--orange); }
        .c-none { border-color: #bdc1c6; }

        .group-header { padding: 15px 20px; font-weight: 800; background: #fafbfc; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #edf2f7; }
        .total-badge { background: var(--red); color: white; padding: 5px 15px; border-radius: 25px; font-size: 16px; font-weight: 900; box-shadow: 0 4px 8px rgba(234, 67, 53, 0.3); }
        
        table { width: 100%; border-collapse: collapse; }
        td { padding: 20px; border-bottom: 1px solid #f1f3f4; vertical-align: top; }
        
        .item-title { font-size: 20px; font-weight: 800; color: #1a202c; display: block; margin-bottom: 12px; }
        
        .shop-list-container { display: flex; flex-wrap: wrap; gap: 10px; }
        .shop-item { background: #edf2f7; padding: 10px 14px; border-radius: 12px; font-size: 17px; color: #2d3748; border: 1px solid #e2e8f0; }
        .shop-item b { font-size: 26px; color: var(--red); margin-left: 5px; font-family: 'Arial Black', sans-serif; }
        
        .special-item { background: #fff5f5; border: 1px solid var(--red); color: var(--red); }

        .qty-cell { text-align: right; font-weight: 900; font-size: 36px; color: var(--blue); width: 85px; padding-top: 25px !important; }
        .note-tag { font-size: 14px; color: white; background: var(--red); padding: 6px 12px; border-radius: 8px; display: inline-block; margin-top: 15px; font-weight: 700; }

        /* 底部警語樣式 */
        .warning-footer { text-align: center; padding: 25px 15px; color: #888; font-size: 13px; line-height: 1.6; border-top: 1px solid #e2e8f0; margin-top: 40px; }
        .warning-footer b { color: var(--red); }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📦 出貨快速查詢系統</h1>
        <p>叫貨聯動與多廠商版 ✨</p>
    </div>

    <div class="search-card">
        <input type="text" id="searchInput" placeholder="🔍 請輸入關鍵字 (如：網市)..." oninput="debounceSearch()">
    </div>

    <div id="displayArea">
        <div class="empty-state">
            <span class="emoji">🕵️‍♂️</span>
            <p>準備好了！請輸入關鍵字開始查詢</p>
        </div>
    </div>

    <div class="warning-footer">
        ⚠️ <b>溫馨提示：</b><br>
        系統偶有出錯的可能，若有問題請直接詢問版面小編。
    </div>
</div>

<script>
    const SHEET_ID = '2PACX-1vSKJ-bbty6XrC42lhDt4IZkx30Xd5suv7asS7ujAncXMnv_AnHBRNuXbxU_HeH3sNxduS22z8I_rqF0'; 
    const SHEET_URL = `https://docs.google.com/spreadsheets/d/e/${SHEET_ID}/pub?output=csv&gid=0`;
    
    const SHOP_MAP = { "中港": 3, "小米妮": 4, "北冰": 5, "小賴": 6, "安星": 7, "新廠商": 8 };

    let timer = null;
    function debounceSearch() { clearTimeout(timer); timer = setTimeout(fetchData, 300); }

    async function fetchData() {
        const query = document.getElementById('searchInput').value.trim();
        const area = document.getElementById('displayArea');
        if (!query) { 
            area.innerHTML = `<div class="empty-state"><span class="emoji">🕵️‍♂️</span><p>準備好了！請輸入關鍵字開始查詢</p></div>`;
            return; 
        }
        try {
            const resp = await fetch(`${SHEET_URL}&cache=${Date.now()}`);
            const csv = await resp.text();
            const rows = csv.split(/\r?\n/).map(r => r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/));
            const filtered = rows.filter(r => r[0] && r[0].replace(/"/g, '').includes(query));
            if (filtered.length === 0) { 
                area.innerHTML = `<div class="empty-state"><span class="emoji">😅</span><p>喔不！找不到相關品項...</p></div>`;
                return; 
            }
            renderGroups(filtered);
        } catch (e) { console.error(e); }
    }

    function renderGroups(matches) {
        const area = document.getElementById('displayArea');
        area.innerHTML = "";
        const finalGroups = {};

        matches.forEach(row => {
            const name = row[0].replace(/"/g, '');
            const ruleStr = (row[12] || "").replace(/"/g, '').trim(); 
            const note = (row[13] || "").replace(/"/g, '').trim();
            const orderQty = parseInt(row[10]) || 0; 
            const extraQty = parseInt(row[11]) || 0; 
            
            const rules = ruleStr === "" ? ["全部"] : ruleStr.split('/').map(r => r.trim());
            let used = new Set();

            rules.forEach((rName, idx) => {
                let sub = 0, detailHtmlArr = [];
                const isAll = rName === "全部";
                
                for (const [sName, sIdx] of Object.entries(SHOP_MAP)) {
                    if (isAll || rName.split('+').some(t => sName.includes(t.trim()))) {
                        let v = parseInt(row[sIdx]) || 0;
                        if (v !== 0) { 
                            detailHtmlArr.push(`<div class="shop-item">🏠 ${sName}<b>${v}</b></div>`); 
                            sub += v; 
                            if(!isAll) used.add(sName);
                        }
                    }
                }

                if (isAll && orderQty > 0) {
                    detailHtmlArr.push(`<div class="shop-item special-item">📌 叫貨<b>${orderQty}</b></div>`);
                    detailHtmlArr.push(`<div class="shop-item special-item">📌 多<b>${extraQty}</b></div>`);
                }

                if (sub !== 0 || detailHtmlArr.length > 0) {
                    if (!finalGroups[rName]) finalGroups[rName] = { idx, items: [] };
                    finalGroups[rName].items.push({ name, sub, detail: detailHtmlArr.join(' '), note });
                }
            });

            if (ruleStr !== "") {
                let oSum = 0, oDetailHtml = [];
                for (const [sName, sIdx] of Object.entries(SHOP_MAP)) {
                    if (!used.has(sName)) {
                        let v = parseInt(row[sIdx]) || 0;
                        if (v !== 0) { oDetailHtml.push(`<div class="shop-item">🏠 ${sName}<b>${v}</b></div>`); oSum += v; }
                    }
                }
                if (oSum !== 0) {
                    if (!finalGroups["其他"]) finalGroups["其他"] = { idx: 99, items: [] };
                    finalGroups["其他"].items.push({ name, sub: oSum, detail: oDetailHtml.join(' '), note });
                }
            }
        });

        for (const [gName, data] of Object.entries(finalGroups)) {
            const colorClass = (gName === "其他" || gName === "全部") ? "c-none" : `c-${data.idx % 3}`;
            const total = data.items.reduce((s, i) => s + i.sub, 0);
            let html = `<div class="group-card ${colorClass}"><div class="group-header"><span>📍 ${gName} 分組</span><span class="total-badge">🔢 累計 ${total}</span></div><table>`;
            data.items.forEach(item => {
                html += `<tr><td><span class="item-title">🔹 ${item.name}</span><div class="shop-list-container">${item.detail}</div>${item.note && item.note !== "備註" ? `<span class="note-tag">📝 備註：${item.note}</span>` : ''}</td><td class="qty-cell">${item.sub || ''}</td></tr>`;
            });
            area.innerHTML += html + "</table></div>";
        }
    }
</script>
</body>
</html>
