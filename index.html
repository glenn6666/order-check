<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>訂單查詢系統</title>
    <style>
        body { font-family: "Microsoft JhengHei", -apple-system, sans-serif; padding: 15px; max-width: 800px; margin: auto; background-color: #f4f7f9; }
        h2 { color: #2c3e50; text-align: center; margin-bottom: 20px; }
        .search-box { display: flex; gap: 10px; margin-bottom: 20px; position: sticky; top: 10px; z-index: 100; }
        input { flex: 1; padding: 15px; border: 2px solid #007bff; border-radius: 8px; font-size: 16px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        button { padding: 15px 25px; background-color: #007bff; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; }
        button:hover { background-color: #0056b3; }
        
        .card { background: white; padding: 15px; margin-bottom: 12px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); border-left: 5px solid #007bff; }
        .item-row { display: flex; justify-content: space-between; align-items: center; }
        .item-name { font-size: 1.1em; font-weight: bold; color: #333; margin-bottom: 5px; }
        .item-details { color: #666; font-size: 0.9em; }
        .item-price { font-weight: bold; color: #d9534f; font-size: 1.1em; }
        
        .total-bar { margin-top: 20px; padding: 20px; background: #343a40; color: white; border-radius: 10px; text-align: right; font-size: 1.3em; font-weight: bold; }
        .total-label { font-size: 0.7em; color: #ccc; margin-right: 10px; }
        
        #loading { text-align: center; display: none; padding: 20px; font-weight: bold; color: #007bff; }
        .no-data { text-align: center; padding: 50px 20px; color: #999; }
    </style>
</head>
<body>

<h2>📦 我的待取貨清單</h2>

<div class="search-box">
    <input type="text" id="nameInput" placeholder="請輸入您的暱稱 (例: @阿勝)">
    <button onclick="searchData()">查詢</button>
</div>

<div id="loading">讀取最新資料中...</div>
<div id="results"></div>

<script>
    const sheetId = '1pjTOojFm4-_rGpGGN9Nv31GCdYMPtSDQkfn8vbyBFLQ';
    const gid = '171915529';
    const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&gid=${gid}`;

    // 強大的 CSV 解析器，可處理含逗號的金額 (如 "$1,900")
    function parseCSV(text) {
        const rows = [];
        let currentRow = [];
        let currentField = '';
        let inQuotes = false;

        for (let i = 0; i < text.length; i++) {
            const char = text[i];
            const nextChar = text[i + 1];

            if (inQuotes) {
                if (char === '"' && nextChar === '"') {
                    currentField += '"'; i++;
                } else if (char === '"') {
                    inQuotes = false;
                } else {
                    currentField += char;
                }
            } else {
                if (char === '"') {
                    inQuotes = true;
                } else if (char === ',') {
                    currentRow.push(currentField);
                    currentField = '';
                } else if (char === '\n' || char === '\r') {
                    currentRow.push(currentField);
                    if (currentRow.length > 1 || currentRow[0] !== '') rows.push(currentRow);
                    currentRow = [];
                    currentField = '';
                    if (char === '\r' && nextChar === '\n') i++;
                } else {
                    currentField += char;
                }
            }
        }
        if (currentField || currentRow.length > 0) {
            currentRow.push(currentField);
            rows.push(currentRow);
        }
        return rows;
    }

    async function searchData() {
        const query = document.getElementById('nameInput').value.trim().toLowerCase();
        if (!query) return alert('請輸入暱稱！');

        const resultDiv = document.getElementById('results');
        const loading = document.getElementById('loading');
        
        resultDiv.innerHTML = '';
        loading.style.display = 'block';

        try {
            const response = await fetch(csvUrl);
            const csvText = await response.text();
            const rows = parseCSV(csvText);

            let grandTotal = 0;
            let foundCount = 0;
            let htmlContent = '';

            // A:狀態(0), C:暱稱(2), D:商品(3), E:數量(4), F:金額(5), M:小計(12)
            for (let i = 1; i < rows.length; i++) {
                const row = rows[i];
                const status = (row[0] || "").trim().toUpperCase();
                const customer = (row[2] || "").trim();
                const itemName = (row[3] || "").trim();
                const qty = (row[4] || "").trim();
                
                // 清理金額文字，只保留數字
                const cleanPrice = (row[5] || "").replace(/[$,]/g, '');
                const cleanSubtotal = (row[12] || "").replace(/[$,]/g, '');
                
                const priceNum = parseInt(cleanPrice) || 0;
                const subtotalNum = parseInt(cleanSubtotal) || 0;

                // 搜尋邏輯：名字包含關鍵字 且 狀態不是 TRUE
                if (customer.toLowerCase().includes(query) && status !== "TRUE" && itemName !== "") {
                    htmlContent += `
                        <div class="card">
                            <div class="item-name">${itemName}</div>
                            <div class="item-row">
                                <div class="item-details">
                                    單價: $${priceNum.toLocaleString()} / 數量: ${qty}
                                </div>
                                <div class="item-price">$${subtotalNum.toLocaleString()}</div>
                            </div>
                        </div>
                    `;
                    grandTotal += subtotalNum;
                    foundCount++;
                }
            }

            if (foundCount > 0) {
                resultDiv.innerHTML = htmlContent + `
                    <div class="total-bar">
                        <span class="total-label">待領取共 ${foundCount} 項，總計</span>
                        $${grandTotal.toLocaleString()}
                    </div>
                `;
            } else {
                resultDiv.innerHTML = `<div class="no-data">📭 目前查無待領取商品。<br><small>(請確認名字是否輸入正確)</small></div>`;
            }

        } catch (error) {
            console.error(error);
            alert('系統讀取失敗，請確認網路或試算表權限！');
        } finally {
            loading.style.display = 'none';
        }
    }
</script>

</body>
</html>
